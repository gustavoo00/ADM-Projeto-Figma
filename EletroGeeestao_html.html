<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EletroGestão PRO</title>
<style>
  :root {
    --bg: #0a0e1a; --surface: #0f1628; --card: #131d35; --elevated: #1a2540; --input: #0d1526;
    --blue: #3b82f6; --cyan: #22d3ee; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --purple: #8b5cf6;
    --text: #f0f4ff; --muted: #8b9dbf; --soft: #52617d; --border: rgba(59,130,246,.18); --bright: rgba(59,130,246,.38);
    font-family: Inter, Segoe UI, Arial, sans-serif;
  }
  body.light { --bg:#f3f6fb;--surface:#fff;--card:#fff;--elevated:#e8eef8;--input:#f8fafc;--text:#142033;--muted:#52617d;--soft:#718096;--border:rgba(30,64,175,.16);--bright:rgba(37,99,235,.34); }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }
  button,input,select,textarea { font:inherit; }
  input,select,textarea { width:100%; background:var(--input); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:9px 11px; outline:none; }
  input:focus,select:focus,textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(59,130,246,.16); }
  textarea { resize:vertical; min-height:78px; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--muted); background:var(--elevated); font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:10px 12px; }
  td { padding:11px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
  tr:hover td { background:rgba(59,130,246,.045); }
  .login { min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at 50% 0%,rgba(59,130,246,.16),transparent 38%),var(--bg); }
  .login-card { width:min(460px,100%); background:var(--card); border:1px solid var(--bright); border-radius:16px; padding:30px; box-shadow:0 18px 70px rgba(0,0,0,.35); }
  .brand { display:flex; gap:12px; align-items:center; margin-bottom:24px; }
  .brand-mark { width:42px; height:42px; border-radius:10px; display:grid; place-items:center; background:var(--blue); font-weight:800; }
  .brand-title { font-size:19px; font-weight:800; }
  .brand-sub { font-size:12px; color:var(--muted); margin-top:2px; }
  .tabs { display:grid; grid-template-columns:1fr 1fr; gap:4px; background:var(--elevated); padding:4px; border-radius:8px; margin-bottom:20px; }
  .tab { border:0; border-radius:6px; padding:9px; background:transparent; color:var(--muted); cursor:pointer; }
  .tab.active { background:var(--blue); color:white; }
  .layout { min-height:100vh; display:grid; grid-template-rows:56px 1fr 38px; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; padding:0 18px; position:sticky; top:0; z-index:4; }
  .shell { display:grid; grid-template-columns:230px 1fr; min-height:calc(100vh - 94px); }
  .sidebar { background:var(--surface); border-right:1px solid var(--border); padding:14px 10px; }
  .nav { display:flex; width:100%; align-items:center; gap:9px; color:var(--muted); background:transparent; border:0; padding:10px 12px; border-radius:7px; cursor:pointer; text-align:left; margin-bottom:3px; }
  .nav:hover { color:var(--text); background:var(--elevated); }
  .nav.active { color:var(--blue); background:rgba(59,130,246,.14); border-left:2px solid var(--blue); }
  .content { padding:24px; overflow:auto; }
  .footer { background:var(--card); border-top:1px solid var(--border); color:var(--soft); display:flex; justify-content:space-between; align-items:center; padding:0 18px; font-size:11px; }
  .title { font-size:22px; font-weight:800; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .grid-2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .metric { background:var(--card); border:1px solid var(--border); border-top:2px solid var(--line,var(--blue)); border-radius:12px; padding:17px; }
  .metric-label { color:var(--soft); text-transform:uppercase; letter-spacing:.06em; font-size:11px; margin-bottom:8px; }
  .metric-value { font-family:Consolas,monospace; font-size:26px; font-weight:800; }
  .section { display:flex; align-items:center; gap:8px; color:var(--soft); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
  .section:after { content:""; height:1px; background:var(--border); flex:1; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .space { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
  .btn { border:1px solid var(--border); background:var(--elevated); color:var(--text); border-radius:7px; padding:8px 13px; cursor:pointer; }
  .btn:hover { border-color:var(--bright); }
  .primary { background:var(--blue); border-color:var(--blue); color:white; }
  .danger { background:rgba(239,68,68,.14); border-color:rgba(239,68,68,.35); color:#fca5a5; }
  .mini { padding:5px 8px; font-size:12px; }
  .tag { display:inline-flex; align-items:center; padding:3px 8px; border-radius:5px; font-size:11px; border:1px solid currentColor; background:rgba(255,255,255,.04); }
  .green{color:#4ade80}.blue{color:#60a5fa}.red{color:#f87171}.amber{color:#fbbf24}.purple{color:#a78bfa}.cyan{color:#22d3ee}.gray{color:var(--muted)}
  .progress { height:7px; background:var(--elevated); border-radius:99px; overflow:hidden; }
  .bar { height:100%; background:var(--blue); border-radius:99px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .field { margin-bottom:12px; }
  .label { display:block; color:var(--muted); font-size:12px; font-weight:600; margin-bottom:5px; }
  .modal-wrap { position:fixed; inset:0; background:rgba(0,0,0,.72); display:grid; place-items:center; padding:20px; z-index:10; }
  .modal { width:min(640px,100%); max-height:90vh; overflow:auto; background:var(--card); border:1px solid var(--bright); border-radius:16px; padding:24px; }
  .modal-title { font-size:18px; font-weight:800; margin-bottom:18px; }
  .alert { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.32); color:#fca5a5; border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:14px; }
  .empty { color:var(--soft); text-align:center; padding:34px; }
  .avatar { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; border:1px solid var(--bright); color:var(--blue); background:rgba(59,130,246,.13); font-weight:800; }
  .chart { height:12px; border-radius:99px; background:var(--elevated); overflow:hidden; }
  @media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{position:static;display:flex;overflow-x:auto}.nav{white-space:nowrap}.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.topbar .hide-sm{display:none}}

  /* ── Assistente IA ── */
  #ai-fab{position:fixed;bottom:24px;right:24px;z-index:100;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;cursor:pointer;display:grid;place-items:center;box-shadow:0 6px 28px rgba(59,130,246,.5);transition:transform .18s}
  #ai-fab:hover{transform:scale(1.1)}
  #ai-fab svg{width:26px;height:26px;fill:white}
  #ai-panel{position:fixed;bottom:88px;right:24px;z-index:100;width:min(420px,calc(100vw - 32px));height:min(560px,calc(100vh - 110px));background:var(--card);border:1px solid var(--bright);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden}
  #ai-panel.closed{display:none}
  .ai-head{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(139,92,246,.2));border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px}
  .ai-head-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;flex-shrink:0}
  .ai-head-av svg{width:19px;height:19px;fill:white}
  .ai-head-info{flex:1}
  .ai-head-name{font-weight:800;font-size:14px}
  .ai-head-st{font-size:11px;color:var(--cyan)}
  #ai-close{border:none;background:none;color:var(--muted);cursor:pointer;font-size:20px;padding:2px 6px;line-height:1}
  #ai-close:hover{color:var(--text)}
  #ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  #ai-msgs::-webkit-scrollbar{width:4px}
  #ai-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .ai-msg{display:flex;gap:8px;max-width:92%}
  .ai-msg.u{align-self:flex-end;flex-direction:row-reverse}
  .ai-bub{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55;background:var(--elevated);word-break:break-word}
  .ai-msg.u .ai-bub{background:linear-gradient(135deg,var(--blue),#7c3aed);color:white}
  .ai-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;margin-top:2px}
  .ai-av svg{width:15px;height:15px;fill:white}
  #ai-chips{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
  .ai-chip{border:1px solid var(--bright);background:rgba(59,130,246,.08);color:var(--blue);border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;transition:background .15s}
  .ai-chip:hover{background:rgba(59,130,246,.22)}
  #ai-irow{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
  #ai-input{flex:1;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;resize:none;min-height:40px;max-height:100px;outline:none;font-family:inherit;line-height:1.4}
  #ai-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.16)}
  #ai-send{width:38px;height:38px;border-radius:9px;flex-shrink:0;background:var(--blue);border:none;cursor:pointer;display:grid;place-items:center}
  #ai-send:hover{background:#2563eb}
  #ai-send:disabled{background:var(--elevated);opacity:.5;cursor:default}
  #ai-send svg{width:17px;height:17px;fill:white}
  .ai-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
  .ai-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
  .ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="ai-fab" style="display:none"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg></div>
<div id="ai-panel" class="closed">
  <div class="ai-head">
    <div class="ai-head-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg></div>
    <div class="ai-head-info"><div class="ai-head-name">Assistente EletroGestão</div><div class="ai-head-st">● IA especializada neste sistema</div></div>
    <button id="ai-close">✕</button>
  </div>
  <div id="ai-msgs"></div>
  <div id="ai-chips"></div>
  <div id="ai-irow">
    <textarea id="ai-input" placeholder="Pergunte sobre materiais, projetos, estoque..." rows="1"></textarea>
    <button id="ai-send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>
<script>
(() => {
  /* ═══════════════════════════ DADOS INICIAIS ═══════════════════════════ */
  const INIT_USERS = [
    { id:1, name:'João Engenheiro', email:'engenheiro@demo.com', password:'123456', role:'manager', company:'EletroTech Ltda', phone:'(11) 99999-1111', cpf:'111.111.111-11', address:'Av. Paulista, 1000' },
    { id:2, name:'Maria Cliente', email:'cliente@demo.com', password:'123456', role:'client', company:'Indústria ABC', phone:'(11) 98888-2222', cpf:'222.222.222-22', address:'Rua das Flores, 50' }
  ];
  const INIT_PROJECTS = [
    { id:1, name:'Painel Elétrico Industrial #01', clientId:2, managerId:1, status:'in_progress', progress:62, startDate:'2024-01-10', endDate:'2024-04-30', description:'Painel de automação para linha de produção', priority:'high', budget:48000 },
    { id:2, name:'Instalação CFTV - Galpão Norte', clientId:2, managerId:1, status:'in_progress', progress:35, startDate:'2024-02-01', endDate:'2024-05-15', description:'Sistema completo de câmeras IP e gravação', priority:'medium', budget:22500 },
    { id:3, name:'Automação Predial Torre A', clientId:2, managerId:1, status:'completed', progress:100, startDate:'2023-09-01', endDate:'2024-01-20', description:'Automação de iluminação e ar condicionado', priority:'low', budget:85000 }
  ];
  const INIT_MATERIALS = [
    { id:1, projectId:1, name:'Cabo Flexível 2,5mm² - 750V', code:'CAB-001', category:'Cabos', qty:500, unit:'m', unitPrice:4.80, supplier:'Prysmian', status:'available' },
    { id:2, projectId:1, name:'Disjuntor Bipolar 32A', code:'DIS-032', category:'Proteção', qty:8, unit:'un', unitPrice:78.50, supplier:'ABB', status:'in_purchase' },
    { id:3, projectId:1, name:'Fonte de Alimentação 24V / 10A', code:'FNT-024', category:'Fonte', qty:2, unit:'un', unitPrice:320.00, supplier:'MEAN WELL', status:'missing' },
    { id:4, projectId:1, name:'CLP S7-1200 CPU 1214C', code:'CLP-001', category:'Automação', qty:1, unit:'un', unitPrice:4200.00, supplier:'Siemens', status:'installed' },
    { id:5, projectId:1, name:'Sensor de Presença Indutivo', code:'SEN-IND', category:'Sensores', qty:12, unit:'un', unitPrice:95.00, supplier:'Pepperl+Fuchs', status:'pending' },
    { id:6, projectId:2, name:'Câmera IP Full HD 2MP', code:'CAM-02M', category:'CFTV', qty:20, unit:'un', unitPrice:380.00, supplier:'Hikvision', status:'in_purchase' }
  ];
  const INIT_STOCK = [
    { id:1, materialId:1, type:'in', qty:500, date:'2024-01-15', supplier:'Prysmian', note:'Compra inicial', projectId:1 },
    { id:2, materialId:4, type:'in', qty:1, date:'2024-01-20', supplier:'Siemens', note:'Entrega programada', projectId:1 },
    { id:3, materialId:1, type:'out', qty:180, date:'2024-02-05', supplier:'', note:'Instalação Setor A', projectId:1 }
  ];
  const INIT_NOTIFICATIONS = [
    { id:1, type:'warning', text:'Fonte 24V/10A está em falta no estoque', time:'5 min', read:false, projectId:1 },
    { id:2, type:'info', text:'Disjuntor 32A aguardando aprovação de compra', time:'22 min', read:false, projectId:1 },
    { id:3, type:'success', text:'CLP S7-1200 foi instalado com sucesso', time:'1h', read:true, projectId:1 }
  ];

  /* ═══════════════════════════ METADADOS ═══════════════════════════════ */
  const statusMeta = {
    available:{ label:'Disponível', cls:'green' },
    in_purchase:{ label:'Em compra', cls:'blue' },
    missing:{ label:'Em falta', cls:'red' },
    installed:{ label:'Instalado', cls:'cyan' },
    pending:{ label:'Pendente', cls:'amber' }
  };
  const projectStatus = {
    in_progress:{ label:'Em andamento', cls:'blue' },
    completed:{ label:'Concluído', cls:'green' },
    paused:{ label:'Pausado', cls:'amber' },
    planning:{ label:'Planejamento', cls:'purple' }
  };

  /* ═══════════════════════════ ESTADO ══════════════════════════════════ */
  const state = {
    user:null, page:'dashboard', loginTab:'login', error:'', search:'', filter:'all', modal:null,
    users:   load('egp_users',  INIT_USERS),
    projects:load('egp_proj',   INIT_PROJECTS),
    materials:load('egp_mats',  INIT_MATERIALS),
    stock:   load('egp_stock',  INIT_STOCK),
    notifications:load('egp_notif', INIT_NOTIFICATIONS)
  };

  function load(k,fb){ try{ return JSON.parse(localStorage.getItem(k))||fb; }catch{ return fb; } }
  function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
  function persist(){
    save('egp_users',state.users); save('egp_proj',state.projects);
    save('egp_mats',state.materials); save('egp_stock',state.stock);
    save('egp_notif',state.notifications);
  }

  /* ═══════════════════════════ UTILITÁRIOS ═════════════════════════════ */
  const brl = n => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(n)||0);
  const num = n => new Intl.NumberFormat('pt-BR').format(Number(n)||0);
  const esc = v => String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const initials = n => String(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const myProjects = () => state.user?.role==='manager' ? state.projects : state.projects.filter(p=>p.clientId===state.user?.id);
  const myMaterials = () => state.materials.filter(m=>myProjects().some(p=>p.id===m.projectId));
  const tag = (l,c) => `<span class="tag ${c||'gray'}">${esc(l)}</span>`;
  const progBar = v => `<div class="progress"><div class="bar" style="width:${Math.max(0,Math.min(100,Number(v)||0))}%;background:${Number(v)===100?'var(--green)':'var(--blue)'}"></div></div>`;

  /* ═══════════════════════════ RENDER PRINCIPAL ════════════════════════ */
  function render() {
    document.getElementById('app').innerHTML = state.user ? appShell() : loginView();
    bindApp();
    const fab = document.getElementById('ai-fab');
    if (fab) fab.style.display = state.user ? 'grid' : 'none';
  }

  /* ═══════════════════════════ TELA DE LOGIN ═══════════════════════════ */
  function loginView() {
    return `<div class="login"><div class="login-card">
      <div class="brand"><div class="brand-mark">EG</div><div><div class="brand-title">EletroGestão PRO</div><div class="brand-sub">Gestão de Projetos Eletroeletrônicos</div></div></div>
      <div class="tabs">
        <button class="tab ${state.loginTab==='login'?'active':''}" data-tab="login">Entrar</button>
        <button class="tab ${state.loginTab==='register'?'active':''}" data-tab="register">Cadastrar</button>
      </div>
      ${state.error?`<div class="alert">${esc(state.error)}</div>`:''}
      ${state.loginTab==='login'?loginForm():registerForm()}
    </div></div>`;
  }
  function loginForm() {
    return `<form id="loginForm">
      <div class="field"><label class="label">E-mail</label><input name="email" type="email" placeholder="seu@email.com" required></div>
      <div class="field"><label class="label">Senha</label><input name="password" type="password" placeholder="********" required></div>
      <button class="btn primary" style="width:100%">Entrar no sistema</button>
      <div class="card" style="margin-top:18px;padding:13px;font-size:12px;color:var(--muted)">Demonstração:<br>Gerente: engenheiro@demo.com / 123456<br>Cliente: cliente@demo.com / 123456</div>
    </form>`;
  }
  function registerForm() {
    return `<form id="registerForm">
      <div class="field"><label class="label">Tipo de conta</label><select name="role"><option value="client">Cliente</option><option value="manager">Gerente / Engenheiro</option></select></div>
      <div class="form-grid">
        <div class="field"><label class="label">Nome completo</label><input name="name" required></div>
        <div class="field"><label class="label">E-mail</label><input name="email" type="email" required></div>
      </div>
      <div class="form-grid">
        <div class="field"><label class="label">Telefone</label><input name="phone"></div>
        <div class="field"><label class="label">CPF / CNPJ</label><input name="cpf"></div>
      </div>
      <div class="field"><label class="label">Empresa</label><input name="company"></div>
      <div class="field"><label class="label">Endereço</label><input name="address"></div>
      <div class="form-grid">
        <div class="field"><label class="label">Senha</label><input name="password" type="password" required></div>
        <div class="field"><label class="label">Confirmar senha</label><input name="confirm" type="password" required></div>
      </div>
      <button class="btn primary" style="width:100%">Criar conta</button>
    </form>`;
  }

  /* ═══════════════════════════ SHELL DO APP ════════════════════════════ */
  function appShell() {
    const unread = state.notifications.filter(n=>!n.read).length;
    const nav = [
      ['dashboard','Dashboard'],['projects','Projetos'],['materials','Materiais'],['stock','Estoque'],
      ['costs','Custos'],['analytics','Análises'],['pending','Pendentes'],
      ['notifications',`Notificações${unread?` (${unread})`:''}`]
    ];
    if (state.user.role==='manager') nav.push(['manager','Área do gerente']);
    return `<div class="layout">
      <div class="topbar">
        <div class="brand" style="margin:0;margin-right:auto"><div class="brand-mark" style="width:34px;height:34px">EG</div><div><div class="brand-title" style="font-size:15px">EletroGestão PRO</div></div></div>
        <input class="hide-sm" id="globalSearch" placeholder="Buscar..." style="max-width:220px" value="${esc(state.search)}">
        <div class="avatar">${initials(state.user.name)}</div>
        <div class="hide-sm"><div style="font-size:12px;font-weight:700">${esc(state.user.name.split(' ')[0])}</div><div style="font-size:10px;color:var(--soft)">${state.user.role==='manager'?'Gerente':'Cliente'}</div></div>
        <button class="btn mini" id="logout">Sair</button>
      </div>
      <div class="shell">
        <div class="sidebar">${nav.map(([id,label])=>`<button class="nav ${state.page===id?'active':''}" data-page="${id}">${esc(label)}</button>`).join('')}</div>
        <main class="content">${pageView()}</main>
      </div>
      <div class="footer"><span>EletroGestão PRO</span><span>v2.0</span></div>
    </div>${modalView()}`;
  }

  /* ═══════════════════════════ PÁGINAS ════════════════════════════════ */
  function pageView() {
    if (state.page==='projects')     return projectsPage();
    if (state.page==='materials')    return materialsPage();
    if (state.page==='stock')        return stockPage();
    if (state.page==='costs')        return costsPage();
    if (state.page==='analytics')    return analyticsPage();
    if (state.page==='pending')      return pendingPage();
    if (state.page==='notifications')return notificationsPage();
    if (state.page==='manager')      return managerPage();
    return dashboardPage();
  }

  function metric(label,value,color){ return `<div class="metric" style="--line:${color}"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div></div>`; }
  function projectMini(p){ return `<div style="margin-bottom:14px"><div class="space" style="align-items:center"><b>${esc(p.name)}</b>${tag(projectStatus[p.status]?.label||p.status,projectStatus[p.status]?.cls)}</div>${progBar(p.progress)}<div style="font-size:11px;color:var(--muted);margin-top:4px">${p.progress}% concluído</div></div>`; }

  function dashboardPage() {
    const projects=myProjects(), materials=myMaterials();
    const totalBudget=projects.reduce((s,p)=>s+Number(p.budget||0),0);
    const pending=materials.filter(m=>['missing','pending','in_purchase'].includes(m.status)).length;
    return `<h1 class="title">Dashboard</h1><div class="sub">Visão geral dos seus projetos</div>
      <div class="grid-4" style="margin-bottom:20px">
        ${metric('Projetos ativos',projects.filter(p=>p.status==='in_progress').length,'var(--blue)')}
        ${metric('Concluídos',projects.filter(p=>p.status==='completed').length,'var(--green)')}
        ${metric('Materiais pendentes',pending,'var(--amber)')}
        ${metric('Orçamento total',brl(totalBudget),'var(--cyan)')}
      </div>
      <div class="grid-2">
        <div class="card"><div class="section">Projetos recentes</div>${projects.slice(0,4).map(projectMini).join('')||'<div class="empty">Nenhum projeto</div>'}</div>
        <div class="card"><div class="section">Notificações recentes</div>${state.notifications.slice(0,5).map(n=>`<div style="padding:10px 0;border-bottom:1px solid var(--border)"><div>${esc(n.text)}</div><div style="font-size:11px;color:var(--soft);margin-top:3px">${esc(n.time)} atrás</div></div>`).join('')}</div>
      </div>`;
  }

  function projectsPage() {
    const list=myProjects().filter(p=>p.name.toLowerCase().includes(state.search.toLowerCase()));
    return `<div class="space"><div><h1 class="title">Projetos</h1><div class="sub">Gerencie os projetos eletroeletrônicos</div></div><button class="btn primary" data-open="project">Novo projeto</button></div>
      <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Projeto</th><th>Cliente</th><th>Status</th><th>Prazo</th><th>Orçamento</th><th>Progresso</th><th></th></tr></thead><tbody>
      ${list.map(p=>{ const cl=state.users.find(u=>u.id===p.clientId); return `<tr><td><b>${esc(p.name)}</b><div style="color:var(--muted);font-size:12px">${esc(p.description)}</div></td><td>${esc(cl?.name||'-')}</td><td>${tag(projectStatus[p.status]?.label||p.status,projectStatus[p.status]?.cls)}</td><td>${esc(p.startDate||'-')} até ${esc(p.endDate||'-')}</td><td>${brl(p.budget)}</td><td>${progBar(p.progress)}<div style="font-size:11px;color:var(--muted);margin-top:3px">${p.progress}%</div></td><td><button class="btn mini" data-edit-project="${p.id}">Editar</button> ${state.user.role==='manager'?`<button class="btn danger mini" data-del-project="${p.id}">Excluir</button>`:''}</td></tr>`; }).join('')||'<tr><td colspan="7" class="empty">Nenhum projeto encontrado</td></tr>'}
      </tbody></table></div>`;
  }

  function materialsPage() {
    const ids=new Set(myProjects().map(p=>p.id));
    const list=state.materials.filter(m=>ids.has(m.projectId)&&(state.filter==='all'||m.status===state.filter)&&(m.name.toLowerCase().includes(state.search.toLowerCase())||m.code.toLowerCase().includes(state.search.toLowerCase())));
    return `<div class="space"><div><h1 class="title">Materiais</h1><div class="sub">Controle de materiais dos projetos</div></div><button class="btn primary" data-open="material">Adicionar material</button></div>
      <div class="row" style="margin-bottom:14px"><select id="statusFilter" style="max-width:220px"><option value="all">Todos os status</option>${Object.entries(statusMeta).map(([k,v])=>`<option value="${k}" ${state.filter===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
      <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Código</th><th>Material</th><th>Qtd</th><th>Valor unit.</th><th>Total</th><th>Fornecedor</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map(m=>`<tr><td>${esc(m.code)}</td><td><b>${esc(m.name)}</b><div style="color:var(--muted);font-size:12px">${esc(m.category)}</div></td><td><input data-qty="${m.id}" type="number" value="${m.qty}" style="width:90px"></td><td>${brl(m.unitPrice)}</td><td>${brl(m.qty*m.unitPrice)}</td><td>${esc(m.supplier)}</td><td><select data-status="${m.id}">${Object.entries(statusMeta).map(([k,v])=>`<option value="${k}" ${m.status===k?'selected':''}>${v.label}</option>`).join('')}</select></td><td><button class="btn mini" data-edit-material="${m.id}">Editar</button> <button class="btn danger mini" data-del-material="${m.id}">Excluir</button></td></tr>`).join('')||'<tr><td colspan="8" class="empty">Nenhum material</td></tr>'}
      </tbody></table></div>`;
  }

  function stockPage() {
    const cur=id=>{ const i=state.stock.filter(s=>s.materialId===id&&s.type==='in').reduce((a,b)=>a+b.qty,0); const o=state.stock.filter(s=>s.materialId===id&&s.type==='out').reduce((a,b)=>a+b.qty,0); return{i,o,s:i-o}; };
    return `<div class="space"><div><h1 class="title">Estoque</h1><div class="sub">Registros de entrada e saída</div></div><button class="btn primary" data-open="stock">Registrar movimento</button></div>
      <div class="grid-2">
        <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Material</th><th>Entradas</th><th>Saídas</th><th>Saldo</th></tr></thead><tbody>
        ${state.materials.map(m=>{ const c=cur(m.id); return `<tr><td>${esc(m.code)} - ${esc(m.name)}</td><td class="green">${num(c.i)} ${esc(m.unit)}</td><td class="red">${num(c.o)} ${esc(m.unit)}</td><td>${tag(`${num(c.s)} ${m.unit}`,c.s<=0?'red':'green')}</td></tr>`; }).join('')}
        </tbody></table></div>
        <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Tipo</th><th>Material</th><th>Qtd</th><th>Data</th><th>Obs.</th></tr></thead><tbody>
        ${[...state.stock].reverse().map(s=>{ const m=state.materials.find(x=>x.id===s.materialId); return `<tr><td>${tag(s.type==='in'?'Entrada':'Saída',s.type==='in'?'green':'red')}</td><td>${esc(m?.name||'-')}</td><td>${num(s.qty)}</td><td>${esc(s.date)}</td><td>${esc(s.note||s.supplier||'-')}</td></tr>`; }).join('')}
        </tbody></table></div>
      </div>`;
  }

  function costsPage() {
    const p=myProjects()[0], mats=p?state.materials.filter(m=>m.projectId===p.id):[];
    const mat=mats.reduce((s,m)=>s+m.qty*m.unitPrice,0);
    const lab=mat*.25,ins=mat*.12,op=mat*.08,tax=(mat+lab+ins+op)*.0925,tot=(mat+lab+ins+op+tax)*1.15;
    return `<h1 class="title">Custos</h1><div class="sub">Estimativa automática</div><div class="card"><div class="section">${esc(p?.name||'Nenhum projeto')}</div>
      ${[['Materiais',mat,'blue'],['Mão de obra',lab,'purple'],['Instalação',ins,'cyan'],['Operacional',op,'amber'],['Impostos',tax,'red'],['Total final',tot,'green']].map(([l,v,c])=>`<div class="space" style="padding:10px 0;border-bottom:1px solid var(--border)"><span>${l}</span><b class="${c}">${brl(v)}</b></div>`).join('')}
    </div>`;
  }

  function analyticsPage() {
    const mats=myMaterials(), total=mats.reduce((s,m)=>s+m.qty*m.unitPrice,0);
    const byCat={};
    mats.forEach(m=>byCat[m.category]=(byCat[m.category]||0)+m.qty*m.unitPrice);
    return `<h1 class="title">Análises</h1><div class="sub">Visão gráfica dos dados</div><div class="grid-2">
      <div class="card"><div class="section">Status de materiais</div>${Object.entries(statusMeta).map(([k,v])=>{ const c=mats.filter(m=>m.status===k).length; return `<div style="margin-bottom:12px"><div class="space"><span>${v.label}</span><b class="${v.cls}">${c}</b></div>${progBar(Math.min(100,c*20))}</div>`; }).join('')}</div>
      <div class="card"><div class="section">Custo por categoria</div>${Object.entries(byCat).map(([l,v])=>`<div style="margin-bottom:12px"><div class="space"><span>${esc(l)}</span><b>${brl(v)}</b></div><div class="chart"><div class="bar" style="width:${total?(v/total*100):0}%"></div></div></div>`).join('')||'<div class="empty">Sem dados</div>'}</div>
    </div>`;
  }

  function pendingPage() {
    const list=myMaterials().filter(m=>['missing','pending','in_purchase'].includes(m.status));
    return `<h1 class="title">Pendentes</h1><div class="sub">${list.length} itens aguardando ação</div><div class="grid-2">
      ${list.map(m=>`<div class="card"><div class="space"><div><b>${esc(m.name)}</b><div style="color:var(--muted);font-size:12px">${esc(m.code)} - ${esc(m.supplier||'sem fornecedor')}</div></div>${tag(statusMeta[m.status].label,statusMeta[m.status].cls)}</div><div style="margin-top:12px;color:var(--cyan);font-weight:800">${num(m.qty)} ${esc(m.unit)} - ${brl(m.qty*m.unitPrice)}</div></div>`).join('')||'<div class="card empty">Nenhum item pendente</div>'}
    </div>`;
  }

  function notificationsPage() {
    return `<div class="space"><div><h1 class="title">Notificações</h1><div class="sub">${state.notifications.filter(n=>!n.read).length} não lidas</div></div><button class="btn" id="markAll">Marcar todas como lidas</button></div>
      <div class="card">${state.notifications.map(n=>`<div class="space" style="padding:12px 0;border-bottom:1px solid var(--border)"><div><b class="${n.read?'gray':''}">${esc(n.text)}</b><div style="font-size:11px;color:var(--soft);margin-top:3px">${esc(n.time)} atrás</div></div><div>${!n.read?`<button class="btn mini" data-read="${n.id}">Lida</button>`:''} <button class="btn danger mini" data-del-notif="${n.id}">Excluir</button></div></div>`).join('')||'<div class="empty">Nenhuma notificação</div>'}</div>`;
  }

  function managerPage() {
    if (state.user.role!=='manager') return '<div class="card empty">Acesso restrito</div>';
    return `<h1 class="title">Área do gerente</h1><div class="sub">Visão administrativa completa</div>
      <div class="grid-4" style="margin-bottom:20px">${metric('Usuários',state.users.length,'var(--purple)')}${metric('Projetos',state.projects.length,'var(--blue)')}${metric('Valor em projetos',brl(state.projects.reduce((s,p)=>s+p.budget,0)),'var(--cyan)')}${metric('Materiais',state.materials.length,'var(--amber)')}</div>
      <div class="grid-2">
        <div class="card"><div class="section">Usuários</div>${state.users.map(u=>`<div class="space" style="padding:9px 0;border-bottom:1px solid var(--border)"><span>${esc(u.name)}<br><small class="gray">${esc(u.email)}</small></span>${tag(u.role==='manager'?'Gerente':'Cliente',u.role==='manager'?'blue':'gray')}</div>`).join('')}</div>
        <div class="card"><div class="section">Projetos</div>${state.projects.map(projectMini).join('')}</div>
      </div>`;
  }

  /* ═══════════════════════════ MODAIS ══════════════════════════════════ */
  function modalView() {
    if (!state.modal) return '';
    if (state.modal.type==='project')  return projectModal(state.modal.item);
    if (state.modal.type==='material') return materialModal(state.modal.item);
    if (state.modal.type==='stock')    return stockModal();
    return '';
  }
  function projectModal(item={}) {
    const clients=state.users.filter(u=>u.role==='client');
    return `<div class="modal-wrap"><form class="modal" id="projectForm"><div class="modal-title">${item.id?'Editar projeto':'Novo projeto'}</div>
      <input type="hidden" name="id" value="${item.id||''}">
      <div class="field"><label class="label">Nome</label><input name="name" value="${esc(item.name||'')}" required></div>
      <div class="field"><label class="label">Descrição</label><textarea name="description">${esc(item.description||'')}</textarea></div>
      <div class="form-grid">
        <div class="field"><label class="label">Status</label><select name="status">${Object.entries(projectStatus).map(([k,v])=>`<option value="${k}" ${item.status===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
        <div class="field"><label class="label">Prioridade</label><select name="priority"><option value="low" ${item.priority==='low'?'selected':''}>Baixa</option><option value="medium" ${!item.priority||item.priority==='medium'?'selected':''}>Média</option><option value="high" ${item.priority==='high'?'selected':''}>Alta</option></select></div>
      </div>
      <div class="field"><label class="label">Cliente</label><select name="clientId">${clients.map(c=>`<option value="${c.id}" ${Number(item.clientId||clients[0]?.id)===c.id?'selected':''}>${esc(c.name)} - ${esc(c.company||c.email)}</option>`).join('')}</select></div>
      <div class="form-grid">
        <div class="field"><label class="label">Início</label><input name="startDate" type="date" value="${esc(item.startDate||'')}"></div>
        <div class="field"><label class="label">Término</label><input name="endDate" type="date" value="${esc(item.endDate||'')}"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label class="label">Orçamento</label><input name="budget" type="number" step="0.01" value="${item.budget||0}"></div>
        <div class="field"><label class="label">Progresso</label><input name="progress" type="number" min="0" max="100" value="${item.progress||0}"></div>
      </div>
      <div class="row" style="justify-content:flex-end"><button type="button" class="btn" id="cancelModal">Cancelar</button><button class="btn primary">Salvar</button></div>

  function materialModal(item={}) {
    const projects=myProjects();
    return `<div class="modal-wrap"><form class="modal" id="materialForm"><div class="modal-title">${item.id?'Editar material':'Novo material'}</div>
      <input type="hidden" name="id" value="${item.id||''}">
      <div class="form-grid">
        <div class="field"><label class="label">Nome</label><input name="name" value="${esc(item.name||'')}" required></div>
        <div class="field"><label class="label">Código</label><input name="code" value="${esc(item.code||'')}"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label class="label">Categoria</label><input name="category" value="${esc(item.category||'')}"></div>
        <div class="field"><label class="label">Projeto</label><select name="projectId">${projects.map(p=>`<option value="${p.id}" ${Number(item.projectId||projects[0]?.id)===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
      </div>
      <div class="form-grid">
        <div class="field"><label class="label">Quantidade</label><input name="qty" type="number" value="${item.qty||1}"></div>
        <div class="field"><label class="label">Unidade</label><input name="unit" value="${esc(item.unit||'un')}"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label class="label">Valor unitário</label><input name="unitPrice" type="number" step="0.01" value="${item.unitPrice||0}"></div>
        <div class="field"><label class="label">Fornecedor</label><input name="supplier" value="${esc(item.supplier||'')}"></div>
      </div>
      <div class="field"><label class="label">Status</label><select name="status">${Object.entries(statusMeta).map(([k,v])=>`<option value="${k}" ${item.status===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
      <div class="row" style="justify-content:flex-end"><button type="button" class="btn" id="cancelModal">Cancelar</button><button class="btn primary">Salvar</button></div>
    </form></div>`;

  function stockModal() {
    return `<div class="modal-wrap"><form class="modal" id="stockForm"><div class="modal-title">Registrar movimento</div>
      <div class="form-grid">
        <div class="field"><label class="label">Tipo</label><select name="type"><option value="in">Entrada</option><option value="out">Saída</option></select></div>
        <div class="field"><label class="label">Data</label><input name="date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="field"><label class="label">Material</label><select name="materialId">${state.materials.map(m=>`<option value="${m.id}">${esc(m.code)} - ${esc(m.name)}</option>`).join('')}</select></div>
      <div class="form-grid">
        <div class="field"><label class="label">Quantidade</label><input name="qty" type="number" min="1" value="1"></div>
        <div class="field"><label class="label">Fornecedor / destino</label><input name="supplier"></div>
      </div>
      <div class="field"><label class="label">Observação</label><input name="note"></div>

  /* ═══════════════════════════ BIND EVENTOS DO APP ═════════════════════ */
  function bindApp() {
    // tabs login
    document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ state.loginTab=b.dataset.tab; state.error=''; render(); });
    // login
    document.getElementById('loginForm')?.addEventListener('submit',e=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      const user=state.users.find(u=>u.email.toLowerCase()===f.email.trim().toLowerCase()&&u.password===f.password);
      if(!user){ state.error='E-mail ou senha incorretos.'; render(); return; }
      state.user=user; state.error=''; state.page='dashboard'; render();
    });
    // register
    document.getElementById('registerForm')?.addEventListener('submit',e=>{
      e.preventDefault();
      const f=Object.fromEntries(new FormData(e.target));
      if(f.password!==f.confirm){ state.error='As senhas não coincidem.'; render(); return; }
      if(state.users.some(u=>u.email.toLowerCase()===f.email.trim().toLowerCase())){ state.error='E-mail já cadastrado.'; render(); return; }
      const user={ id:Date.now(), name:f.name.trim(), email:f.email.trim().toLowerCase(), password:f.password, role:f.role, company:f.company, phone:f.phone, cpf:f.cpf, address:f.address };
      state.users.push(user); state.user=user; state.page='dashboard'; persist(); render();
    });
    // navegação
    document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{ state.page=b.dataset.page; state.search=''; state.filter='all'; render(); });
    document.getElementById('logout')?.addEventListener('click',()=>{ state.user=null; state.page='dashboard'; render(); });
    document.getElementById('globalSearch')?.addEventListener('input',e=>{ state.search=e.target.value; render(); });
    document.getElementById('statusFilter')?.addEventListener('change',e=>{ state.filter=e.target.value; render(); });
    // modais
    document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{ state.modal={type:b.dataset.open}; render(); });
    document.getElementById('cancelModal')?.addEventListener('click',()=>{ state.modal=null; render(); });
    document.querySelectorAll('[data-edit-project]').forEach(b=>b.onclick=()=>{ state.modal={type:'project',item:state.projects.find(p=>p.id===Number(b.dataset.editProject))}; render(); });
    document.querySelectorAll('[data-edit-material]').forEach(b=>b.onclick=()=>{ state.modal={type:'material',item:state.materials.find(m=>m.id===Number(b.dataset.editMaterial))}; render(); });
    document.querySelectorAll('[data-del-project]').forEach(b=>b.onclick=()=>{ if(confirm('Excluir projeto?')){ state.projects=state.projects.filter(p=>p.id!==Number(b.dataset.delProject)); persist(); render(); } });
    document.querySelectorAll('[data-del-material]').forEach(b=>b.onclick=()=>{ if(confirm('Excluir material?')){ state.materials=state.materials.filter(m=>m.id!==Number(b.dataset.delMaterial)); persist(); render(); } });
    document.querySelectorAll('[data-qty]').forEach(i=>i.onchange=()=>{ const m=state.materials.find(x=>x.id===Number(i.dataset.qty)); if(m){ m.qty=Number(i.value); persist(); } });
    document.querySelectorAll('[data-status]').forEach(s=>s.onchange=()=>{ const m=state.materials.find(x=>x.id===Number(s.dataset.status)); if(m){ m.status=s.value; persist(); } });
    document.getElementById('markAll')?.addEventListener('click',()=>{ state.notifications.forEach(n=>n.read=true); persist(); render(); });
    document.querySelectorAll('[data-read]').forEach(b=>b.onclick=()=>{ const n=state.notifications.find(x=>x.id===Number(b.dataset.read)); if(n){ n.read=true; persist(); render(); } });
    document.querySelectorAll('[data-del-notif]').forEach(b=>b.onclick=()=>{ state.notifications=state.notifications.filter(n=>n.id!==Number(b.dataset.delNotif)); persist(); render(); });
    // forms
    document.getElementById('projectForm')?.addEventListener('submit',saveProject);
    document.getElementById('materialForm')?.addEventListener('submit',saveMaterial);
    document.getElementById('stockForm')?.addEventListener('submit',saveStock);
  }

  function saveProject(e){
    e.preventDefault();
    const f=Object.fromEntries(new FormData(e.target));
    const item={ id:Number(f.id)||Date.now(), name:f.name, description:f.description, status:f.status, priority:f.priority, clientId:Number(f.clientId||state.user.id), managerId:state.user.role==='manager'?state.user.id:1, startDate:f.startDate, endDate:f.endDate, budget:Number(f.budget), progress:Math.max(0,Math.min(100,Number(f.progress))) };
    const idx=state.projects.findIndex(p=>p.id===item.id);
    if(idx>=0) state.projects[idx]=item; else state.projects.push(item);
    state.modal=null; persist(); render();
  }
  function saveMaterial(e){
    e.preventDefault();
    const f=Object.fromEntries(new FormData(e.target));
    const item={ id:Number(f.id)||Date.now(), name:f.name, code:f.code, category:f.category, projectId:Number(f.projectId), qty:Number(f.qty), unit:f.unit, unitPrice:Number(f.unitPrice), supplier:f.supplier, status:f.status };
    const idx=state.materials.findIndex(m=>m.id===item.id);
    if(idx>=0) state.materials[idx]=item; else state.materials.push(item);
    state.modal=null; persist(); render();
  }
  function saveStock(e){
    e.preventDefault();
    const f=Object.fromEntries(new FormData(e.target));
    state.stock.push({ id:Date.now(), materialId:Number(f.materialId), type:f.type, qty:Number(f.qty), date:f.date, supplier:f.supplier, note:f.note, projectId:state.materials.find(m=>m.id===Number(f.materialId))?.projectId||0 });
    state.modal=null; persist(); render();
  }

  /* ═══════════════════════════ ASSISTENTE IA ═══════════════════════════ */
  const aiState = { open:false, msgs:[], busy:false };

  const CHIPS_INIT = ['Quais materiais estão em falta?','Resumo dos projetos ativos','Últimas movimentações no estoque','Valor total dos materiais'];
  const CHIPS_NEXT = ['Itens pendentes de compra','Materiais já instalados','Custo estimado do projeto','Notificações não lidas'];

  function aiContext() {
    const projects=myProjects(), materials=myMaterials();
    const stockInfo=state.materials.map(m=>{
      const i=state.stock.filter(s=>s.materialId===m.id&&s.type==='in').reduce((a,b)=>a+b.qty,0);
      const o=state.stock.filter(s=>s.materialId===m.id&&s.type==='out').reduce((a,b)=>a+b.qty,0);
      return `${m.name}(${m.code}): entradas=${i}, saídas=${o}, saldo=${i-o} ${m.unit}`;
    }).join(' | ');
    return `Você é o assistente virtual do EletroGestão PRO. Responda SOMENTE sobre os dados do sistema abaixo. Seja objetivo e use listas quando útil. Ao final de cada resposta sugira 2 perguntas de acompanhamento (formato: "💡 Você também pode perguntar: ..."). Nunca invente dados fora do contexto.

USUÁRIO: ${state.user.name} | ${state.user.role==='manager'?'Gerente':'Cliente'} | ${state.user.company||''}

PROJETOS: ${projects.map(p=>`${p.name}[status:${projectStatus[p.status]?.label},progresso:${p.progress}%,orçamento:R$${p.budget},prazo:${p.startDate} a ${p.endDate},prioridade:${p.priority}]`).join(' | ')||'Nenhum'}

MATERIAIS: ${materials.map(m=>`[${m.code}]${m.name}(cat:${m.category},qtd:${m.qty}${m.unit},unit:R$${m.unitPrice},total:R$${(m.qty*m.unitPrice).toFixed(2)},forn:${m.supplier||'-'},status:${statusMeta[m.status]?.label})`).join(' | ')||'Nenhum'}

MOVIMENTAÇÕES: ${state.stock.map(s=>{ const m=state.materials.find(x=>x.id===s.materialId); return `${s.type==='in'?'ENTRADA':'SAÍDA'}:${m?.name||'?'},qtd=${s.qty},data=${s.date},obs=${s.note||'-'}`; }).join(' | ')||'Nenhuma'}

SALDO ESTOQUE: ${stockInfo||'Sem dados'}

NOTIFICAÇÕES: ${state.notifications.map(n=>`[${n.read?'lida':'NÃO LIDA'}]${n.text}`).join(' | ')||'Nenhuma'}`;
  }

  function aiRefresh() {
    const msgsEl=document.getElementById('ai-msgs');
    const chipsEl=document.getElementById('ai-chips');
    const sendEl=document.getElementById('ai-send');
    const panel=document.getElementById('ai-panel');
    if(!panel) return;

    panel.className=aiState.open?'':'closed';

    if(msgsEl) {
      const welcome=aiState.msgs.length===0&&!aiState.busy
        ?`<div class="ai-msg"><div class="ai-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg></div><div class="ai-bub">Olá, <b>${esc(state.user?.name?.split(' ')[0]||'')}</b>! 👋<br><br>Sou o assistente do <b>EletroGestão PRO</b>. Posso responder sobre seus materiais, projetos, estoque e transações.<br><br>Escolha uma sugestão abaixo ou escreva sua pergunta!</div></div>`
        :'';
      const bubbles=aiState.msgs.map(m=>m.role==='user'
        ?`<div class="ai-msg u"><div class="ai-bub">${esc(m.text)}</div></div>`
        :`<div class="ai-msg"><div class="ai-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg></div><div class="ai-bub">${m.html}</div></div>`
      ).join('');
      const typing=aiState.busy?`<div class="ai-msg"><div class="ai-av"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg></div><div class="ai-bub"><div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div></div></div>`:'';
      msgsEl.innerHTML=welcome+bubbles+typing;
      msgsEl.scrollTop=msgsEl.scrollHeight;
    }
    if(chipsEl) {
      const chips=(aiState.msgs.length===0?CHIPS_INIT:CHIPS_NEXT).map(t=>`<button class="ai-chip" data-chip="${esc(t)}">${esc(t)}</button>`).join('');
      chipsEl.innerHTML=chips;
      chipsEl.querySelectorAll('[data-chip]').forEach(b=>b.onclick=()=>aiSend(b.dataset.chip));
    }
    if(sendEl) sendEl.disabled=aiState.busy;
  }

  async function aiSend(text) {
    if(!text||!text.trim()||aiState.busy||!state.user) return;
    const q=text.trim();
    const inp=document.getElementById('ai-input');
    if(inp){ inp.value=''; inp.style.height='auto'; }
    aiState.msgs.push({role:'user',text:q});
    aiState.busy=true;
    aiRefresh();

    const history=aiState.msgs.slice(0,-1).map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='user'?m.text:m.raw||''}));
    history.push({role:'user',content:q});

    try {
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:aiContext(),messages:history})
      });
      const data=await res.json();
      const raw=(data.content||[]).map(b=>b.text||'').join('')||'Não consegui processar sua pergunta. Tente novamente.';
      const html=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
      aiState.msgs.push({role:'assistant',html,raw});
    } catch(err) {
      aiState.msgs.push({role:'assistant',html:'⚠️ Erro de conexão. Verifique a internet e tente novamente.',raw:''});
    }
    aiState.busy=false;
    aiRefresh();
  }

  // Bind permanente do assistente (fora do render para não perder estado)
  document.getElementById('ai-fab').addEventListener('click',()=>{ aiState.open=!aiState.open; aiRefresh(); });
  document.getElementById('ai-close').addEventListener('click',()=>{ aiState.open=false; aiRefresh(); });
  document.getElementById('ai-send').addEventListener('click',()=>{ const inp=document.getElementById('ai-input'); if(inp) aiSend(inp.value); });
  document.getElementById('ai-input').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); const inp=document.getElementById('ai-input'); if(inp) aiSend(inp.value); } });
  document.getElementById('ai-input').addEventListener('input',e=>{ e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,100)+'px'; });

  /* ══════════════════════════ INICIAR ══════════════════════════════════ */
  render();
})();
</script>
</body>
</html>
