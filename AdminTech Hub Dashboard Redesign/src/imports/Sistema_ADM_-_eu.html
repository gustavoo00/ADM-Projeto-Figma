<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminTech Hub</title>
  <style>
    /* Reset e variaveis */
    :root {
      color-scheme: light;
      --bg: #f5f8fc;
      --surface: #ffffff;
      --surface-2: #eef4ff;
      --text: #172033;
      --muted: #65738a;
      --line: #d9e3f2;
      --primary: #1769e0;
      --primary-2: #0f4faa;
      --accent: #1fb6ff;
      --success: #11a36a;
      --warning: #e59b17;
      --danger: #e5484d;
      --purple: #7c3aed;
      --shadow: 0 16px 40px rgba(29, 67, 129, .12);
      --radius: 8px;
      --sidebar: 280px;
      --sidebar-small: 82px;
      --transition: 180ms ease;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.dark {
      color-scheme: dark;
      --bg: #0d1424;
      --surface: #111b2f;
      --surface-2: #17243c;
      --text: #edf4ff;
      --muted: #98a8c2;
      --line: #263956;
      --primary: #5c9dff;
      --primary-2: #8dbcff;
      --accent: #35c4ff;
      --shadow: 0 18px 44px rgba(0, 0, 0, .32);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(31, 182, 255, .14), transparent 34rem),
        linear-gradient(135deg, var(--bg), var(--surface-2));
      color: var(--text);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    textarea { min-height: 92px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(23, 105, 224, .12);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 700;
    }

    canvas {
      width: 100%;
      height: 240px;
      display: block;
    }

    /* Layout principal */
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      transition: grid-template-columns var(--transition);
    }

    .app.collapsed { grid-template-columns: var(--sidebar-small) 1fr; }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 30;
    }

    body.dark .sidebar { background: rgba(17, 27, 47, .86); }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 46px;
      padding: 0 8px;
    }

    .brand-mark, .icon-box {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(23, 105, 224, .28);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
    }

    .brand span {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    .app.collapsed .brand-copy,
    .app.collapsed .nav-text,
    .app.collapsed .sidebar-footer span {
      display: none;
    }

    .nav {
      display: grid;
      gap: 6px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--muted);
      background: transparent;
      font-weight: 800;
      text-align: left;
      transition: color var(--transition), background var(--transition), transform var(--transition);
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--primary);
      background: rgba(23, 105, 224, .11);
      transform: translateX(2px);
    }

    .nav-icon {
      width: 24px;
      text-align: center;
      font-size: 1.02rem;
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 70px;
      margin: -22px -22px 22px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 248, 252, .78);
      backdrop-filter: blur(18px);
    }

    body.dark .topbar { background: rgba(13, 20, 36, .78); }

    .topbar h2 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.75rem);
    }

    .topbar p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Componentes */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border-radius: var(--radius);
      padding: 10px 14px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 800;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(23, 105, 224, .13);
    }

    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }

    .btn.danger {
      color: #fff;
      border-color: transparent;
      background: var(--danger);
    }

    .btn.icon {
      width: 42px;
      padding: 0;
      aspect-ratio: 1;
    }

    .section {
      display: none;
      animation: enter .24s ease both;
    }

    .section.active { display: block; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .two-col {
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      align-items: start;
    }

    .three-col {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    body.dark .card { background: rgba(17, 27, 47, .86); }

    .card.pad { padding: 16px; }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .card-head h3, .panel-title {
      margin: 0;
      font-size: 1rem;
    }

    .card-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .85rem;
    }

    .metric {
      position: relative;
      padding: 16px;
      min-height: 132px;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .metric:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 44px rgba(23, 105, 224, .18);
    }

    .metric-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 18px;
      font-size: 1.65rem;
      line-height: 1;
    }

    .metric em {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-style: normal;
      font-size: .82rem;
      font-weight: 700;
    }

    .metric .icon-box {
      width: 38px;
      height: 38px;
      box-shadow: none;
    }

    .tone-success { --tone: var(--success); }
    .tone-warning { --tone: var(--warning); }
    .tone-danger { --tone: var(--danger); }
    .tone-purple { --tone: var(--purple); }
    .tone-blue { --tone: var(--primary); }

    .tone-success .icon-box,
    .tone-warning .icon-box,
    .tone-danger .icon-box,
    .tone-purple .icon-box,
    .tone-blue .icon-box {
      background: color-mix(in srgb, var(--tone), #fff 14%);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters > * {
      width: min(230px, 100%);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: rgba(23, 105, 224, .06);
    }

    td { font-size: .92rem; }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(23, 105, 224, .12);
      color: var(--primary);
      font-size: .78rem;
      font-weight: 800;
    }

    .tag.green { background: rgba(17, 163, 106, .13); color: var(--success); }
    .tag.yellow { background: rgba(229, 155, 23, .16); color: var(--warning); }
    .tag.red { background: rgba(229, 72, 77, .14); color: var(--danger); }
    .tag.purple { background: rgba(124, 58, 237, .14); color: var(--purple); }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(23, 105, 224, .04);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(23, 105, 224, .42);
      box-shadow: 0 12px 28px rgba(23, 105, 224, .12);
    }

    .item h4 {
      margin: 0 0 6px;
      font-size: .98rem;
    }

    .item p {
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.45;
    }

    .rank {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .bar {
      height: 9px;
      margin-top: 8px;
      border-radius: 999px;
      background: rgba(101, 115, 138, .22);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    /* Kanban */
    .kanban {
      display: grid;
      grid-template-columns: repeat(3, minmax(240px, 1fr));
      gap: 16px;
    }

    .kanban-col {
      min-height: 430px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      padding: 12px;
    }

    body.dark .kanban-col { background: rgba(17, 27, 47, .72); }

    .kanban-col h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 12px;
      font-size: .95rem;
    }

    .task-card {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: grab;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(23, 105, 224, .13);
    }

    .task-card.dragging { opacity: .55; }

    .drop-over {
      outline: 2px dashed var(--primary);
      outline-offset: -5px;
    }

    /* Matriz */
    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .matrix-cell {
      min-height: 128px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .matrix-cell h4 {
      margin: 0 0 8px;
      font-size: .9rem;
    }

    /* Assistente */
    .ai-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
    }

    .ai-options {
      display: grid;
      gap: 10px;
    }

    .ai-output {
      min-height: 420px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    /* Modal e toast */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(8, 16, 31, .58);
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open { display: grid; }

    .modal {
      width: min(760px, 100%);
      max-height: min(88vh, 900px);
      overflow-y: auto;
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 30px 80px rgba(0, 0, 0, .28);
      animation: pop .2s ease both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.98) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-head, .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .modal-body { padding: 16px; }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 120;
      display: grid;
      gap: 10px;
      width: min(380px, calc(100vw - 36px));
    }

    .toast {
      display: grid;
      gap: 4px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--primary);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      animation: toastIn .2s ease both;
    }

    .toast strong { font-size: .9rem; }
    .toast span { color: var(--muted); font-size: .83rem; }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsividade */
    @media (max-width: 1180px) {
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two-col, .ai-shell { grid-template-columns: 1fr; }
      .three-col { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 860px) {
      .app, .app.collapsed { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        left: 0;
        transform: translateX(-105%);
        width: min(300px, calc(100vw - 42px));
        transition: transform var(--transition);
      }
      .app.mobile-open .sidebar { transform: translateX(0); }
      .app.collapsed .brand-copy,
      .app.collapsed .nav-text,
      .app.collapsed .sidebar-footer span {
        display: block;
      }
      .main { padding: 16px; }
      .topbar {
        margin: -16px -16px 16px;
        padding: 12px 16px;
      }
      .desktop-only { display: none; }
      .kanban { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .metrics, .three-col, .form-grid, .matrix { grid-template-columns: 1fr; }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .top-actions { width: 100%; justify-content: space-between; }
      .filters, .filters > * { width: 100%; }
      .btn { width: 100%; }
      .btn.icon { width: 42px; }
      .row-actions .btn { width: auto; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Menu lateral">
      <div class="brand">
        <div class="brand-mark">AH</div>
        <div class="brand-copy">
          <h1>AdminTech Hub</h1>
          <span>Simulador empresarial</span>
        </div>
      </div>

      <nav class="nav" id="nav"></nav>

      <div class="sidebar-footer">
        <button class="btn" id="seedBtn" type="button"><span>Dados demo</span></button>
        <button class="btn danger" id="resetBtn" type="button"><span>Limpar dados</span></button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Visão executiva da empresa simulada</p>
        </div>
        <div class="top-actions">
          <button class="btn icon" id="mobileMenuBtn" title="Abrir menu" type="button">☰</button>
          <button class="btn icon desktop-only" id="collapseBtn" title="Recolher menu" type="button">⇤</button>
          <button class="btn icon" id="themeBtn" title="Alternar tema" type="button">◐</button>
          <button class="btn primary" id="quickReportBtn" type="button">Relatório</button>
        </div>
      </header>

      <section class="section active" id="dashboard"></section>
      <section class="section" id="employees"></section>
      <section class="section" id="performance"></section>
      <section class="section" id="training"></section>
      <section class="section" id="cashflow"></section>
      <section class="section" id="stock"></section>
      <section class="section" id="kanban"></section>
      <section class="section" id="marketing"></section>
      <section class="section" id="ideas"></section>
      <section class="section" id="assistant"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle" class="panel-title">Modal</h3>
          <p id="modalSubtitle" style="margin:4px 0 0;color:var(--muted);font-size:.88rem;"></p>
        </div>
        <button class="btn icon" id="modalClose" type="button">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const KEY = "admintech-hub-v1";
      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

      const state = loadState();
      let currentModule = "dashboard";
      let chartRefs = {};
      let dragId = null;

      const modules = [
        ["dashboard", "Dashboard", "Visão executiva da empresa simulada", "▦"],
        ["employees", "Colaboradores", "Cadastros, filtros e competências", "👥"],
        ["performance", "Desempenho", "Avaliações, feedback e ranking", "↗"],
        ["training", "Treinamentos", "Capacitação e certificações", "🎓"],
        ["cashflow", "Fluxo de Caixa", "Receitas, despesas e saldo", "💰"],
        ["stock", "Estoque", "Produtos, entradas e saídas", "📦"],
        ["kanban", "Kanban", "Projetos com drag and drop", "▣"],
        ["marketing", "Marketing", "Clientes, campanhas e 5W2H", "📣"],
        ["ideas", "Banco de Ideias", "Inovação e matriz impacto x esforço", "✦"],
        ["assistant", "Assistente IA", "Análises e relatórios simulados", "AI"]
      ];

      function initialState() {
        return {
          theme: "light",
          collapsed: false,
          employees: [],
          performance: [],
          trainings: [],
          cashflow: [],
          stock: [],
          kanban: [
            { id: cryptoId(), title: "Mapear processo comercial", owner: "Equipe Adm", priority: "Alta", column: "todo" },
            { id: cryptoId(), title: "Preparar relatório financeiro", owner: "Financeiro", priority: "Média", column: "doing" }
          ],
          clients: [],
          campaigns: [],
          plans: [],
          ideas: []
        };
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(KEY));
          return saved ? { ...initialState(), ...saved } : initialState();
        } catch {
          return initialState();
        }
      }

      // Salva somente uma chave no LocalStorage para reduzir leituras e escritas duplicadas.
      function saveState() {
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      function cryptoId() {
        return (crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now() + Math.random());
      }

      function money(value) {
        return Number(value || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
      }

      function pct(value) {
        return `${Math.round(Number(value || 0))}%`;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        }[char]));
      }

      function toast(title, message, type = "success") {
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span>`;
        $("#toastWrap").appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateY(8px)";
          setTimeout(() => el.remove(), 220);
        }, 3200);
      }

      function modal({ title, subtitle = "", body, actions = [] }) {
        $("#modalTitle").textContent = title;
        $("#modalSubtitle").textContent = subtitle;
        $("#modalBody").innerHTML = body;
        $("#modalFoot").innerHTML = "";
        actions.forEach(action => {
          const btn = document.createElement("button");
          btn.className = `btn ${action.variant || ""}`;
          btn.type = "button";
          btn.textContent = action.label;
          btn.addEventListener("click", action.onClick);
          $("#modalFoot").appendChild(btn);
        });
        $("#modalBackdrop").classList.add("open");
        $("#modalBackdrop").setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        $("#modalBackdrop").classList.remove("open");
        $("#modalBackdrop").setAttribute("aria-hidden", "true");
      }

      function confirmAction(title, message, onConfirm) {
        modal({
          title,
          subtitle: message,
          body: `<p style="margin:0;color:var(--muted);line-height:1.55;">Esta ação será salva no LocalStorage do navegador.</p>`,
          actions: [
            { label: "Cancelar", onClick: closeModal },
            { label: "Confirmar", variant: "danger", onClick: () => { closeModal(); onConfirm(); } }
          ]
        });
      }

      function setModule(id) {
        currentModule = id;
        $$(".section").forEach(section => section.classList.toggle("active", section.id === id));
        $$(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.module === id));
        const meta = modules.find(item => item[0] === id);
        $("#pageTitle").textContent = meta[1];
        $("#pageSubtitle").textContent = meta[2];
        $("#app").classList.remove("mobile-open");
        render();
      }

      function initShell() {
        document.body.classList.toggle("dark", state.theme === "dark");
        $("#app").classList.toggle("collapsed", state.collapsed);
        $("#nav").innerHTML = modules.map(([id, label, , icon]) => `
          <button class="nav-btn ${id === currentModule ? "active" : ""}" data-module="${id}" type="button">
            <span class="nav-icon">${icon}</span><span class="nav-text">${label}</span>
          </button>
        `).join("");
        $$(".nav-btn").forEach(btn => btn.addEventListener("click", () => setModule(btn.dataset.module)));
        $("#collapseBtn").addEventListener("click", () => {
          state.collapsed = !state.collapsed;
          $("#app").classList.toggle("collapsed", state.collapsed);
          saveState();
        });
        $("#mobileMenuBtn").addEventListener("click", () => $("#app").classList.toggle("mobile-open"));
        $("#themeBtn").addEventListener("click", () => {
          state.theme = state.theme === "dark" ? "light" : "dark";
          document.body.classList.toggle("dark", state.theme === "dark");
          saveState();
          drawAllCharts();
        });
        $("#modalClose").addEventListener("click", closeModal);
        $("#modalBackdrop").addEventListener("click", event => {
          if (event.target.id === "modalBackdrop") closeModal();
        });
        $("#seedBtn").addEventListener("click", seedDemo);
        $("#resetBtn").addEventListener("click", () => confirmAction("Limpar todos os dados?", "Todos os módulos serão reiniciados.", () => {
          Object.assign(state, initialState(), { theme: state.theme, collapsed: state.collapsed });
          saveState();
          render();
          toast("Dados removidos", "O ambiente foi reiniciado.", "warning");
        }));
        $("#quickReportBtn").addEventListener("click", () => {
          setModule("assistant");
          setTimeout(() => generateAI("report"), 0);
        });
      }

      function render() {
        const renderers = {
          dashboard: renderDashboard,
          employees: renderEmployees,
          performance: renderPerformance,
          training: renderTraining,
          cashflow: renderCashflow,
          stock: renderStock,
          kanban: renderKanban,
          marketing: renderMarketing,
          ideas: renderIdeas,
          assistant: renderAssistant
        };
        renderers[currentModule]();
        saveState();
      }

      function stats() {
        const payroll = state.employees.reduce((sum, item) => sum + Number(item.salary || 0), 0);
        const perfAvg = state.performance.length
          ? state.performance.reduce((sum, item) => sum + Number(item.average || 0), 0) / state.performance.length
          : 0;
        const trainingNeeds = state.performance.filter(item => Number(item.average) < 70).length + state.trainings.filter(item => item.status !== "Concluído").length;
        const income = state.cashflow.filter(item => item.type === "Receita").reduce((sum, item) => sum + Number(item.value || 0), 0);
        const expenses = state.cashflow.filter(item => item.type !== "Receita").reduce((sum, item) => sum + Number(item.value || 0), 0) + payroll;
        const stockValue = state.stock.reduce((sum, item) => sum + Number(item.qty || 0) * Number(item.price || 0), 0);
        const sales = state.cashflow.filter(item => item.type === "Receita" && item.category.toLowerCase().includes("venda")).reduce((sum, item) => sum + Number(item.value || 0), 0);
        const projects = state.kanban.filter(item => item.column !== "done").length;
        return { payroll, perfAvg, trainingNeeds, income, expenses, balance: income - expenses, stockValue, sales, projects };
      }

      function renderDashboard() {
        const s = stats();
        $("#dashboard").innerHTML = `
          <div class="grid metrics">
            ${metric("Colaboradores", state.employees.length, "Equipe cadastrada", "👥", "tone-blue")}
            ${metric("Desempenho médio", pct(s.perfAvg), "Média técnica e comportamental", "↗", "tone-success")}
            ${metric("Capacitações", s.trainingNeeds, "Necessidades abertas", "🎓", "tone-warning")}
            ${metric("Fluxo de caixa", money(s.balance), "Saldo atual estimado", "💰", s.balance >= 0 ? "tone-success" : "tone-danger")}
            ${metric("Estoque atual", money(s.stockValue), "Valor em produtos", "📦", "tone-purple")}
            ${metric("Vendas do mês", money(s.sales), "Receitas categorizadas como venda", "🧾", "tone-blue")}
            ${metric("Projetos ativos", s.projects, "Kanban em andamento", "▣", "tone-warning")}
            ${metric("Clientes", state.clients.length, "Relacionamentos ativos", "📣", "tone-success")}
          </div>
          <div class="grid two-col" style="margin-top:16px;">
            <article class="card">
              <div class="card-head"><div><h3>Financeiro</h3><p>Receitas, despesas e folha salarial</p></div></div>
              <div class="pad"><canvas id="financeChart" height="240"></canvas></div>
            </article>
            <article class="card">
              <div class="card-head"><div><h3>Desempenho por colaborador</h3><p>Ranking das avaliações cadastradas</p></div></div>
              <div class="pad"><canvas id="performanceChart" height="240"></canvas></div>
            </article>
          </div>
          <div class="grid two-col" style="margin-top:16px;">
            <article class="card">
              <div class="card-head"><div><h3>Projetos</h3><p>Distribuição do Kanban</p></div></div>
              <div class="pad"><canvas id="kanbanChart" height="240"></canvas></div>
            </article>
            <article class="card">
              <div class="card-head"><div><h3>Alertas gerenciais</h3><p>Pontos que precisam de decisão</p></div></div>
              <div class="pad list">${managerAlerts()}</div>
            </article>
          </div>
        `;
        drawAllCharts();
      }

      function metric(label, value, hint, icon, tone) {
        return `
          <article class="card metric ${tone}">
            <div class="metric-top"><small>${label}</small><span class="icon-box">${icon}</span></div>
            <strong>${value}</strong><em>${hint}</em>
          </article>
        `;
      }

      function managerAlerts() {
        const s = stats();
        const alerts = [];
        if (s.balance < 0) alerts.push(["Fluxo de caixa negativo", "Revise despesas e planeje novas receitas.", "red"]);
        if (s.trainingNeeds > 0) alerts.push(["Capacitação pendente", "Há treinamentos ou avaliações abaixo do esperado.", "yellow"]);
        if (state.stock.some(item => Number(item.qty) <= 5)) alerts.push(["Estoque crítico", "Alguns produtos estão com baixa quantidade.", "red"]);
        if (!alerts.length) alerts.push(["Operação saudável", "Nenhum alerta crítico no momento.", "green"]);
        return alerts.map(([title, text, color]) => `<div class="item"><h4>${title} <span class="tag ${color}">alerta</span></h4><p>${text}</p></div>`).join("");
      }

      function drawAllCharts() {
        requestAnimationFrame(() => {
          drawFinanceChart();
          drawPerformanceChart();
          drawKanbanChart();
        });
      }

      function chartTheme() {
        const css = getComputedStyle(document.body);
        return {
          text: css.getPropertyValue("--text").trim(),
          muted: css.getPropertyValue("--muted").trim(),
          line: css.getPropertyValue("--line").trim(),
          primary: css.getPropertyValue("--primary").trim(),
          accent: css.getPropertyValue("--accent").trim(),
          success: css.getPropertyValue("--success").trim(),
          warning: css.getPropertyValue("--warning").trim(),
          danger: css.getPropertyValue("--danger").trim()
        };
      }

      // Redesenha no mesmo canvas, sem recriar elementos ou instâncias.
      function prepCanvas(id) {
        const canvas = document.getElementById(id);
        if (!canvas) return null;
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        chartRefs[id] = canvas;
        return { canvas, ctx, w: rect.width, h: rect.height, theme: chartTheme() };
      }

      function drawFinanceChart() {
        const data = prepCanvas("financeChart");
        if (!data) return;
        const s = stats();
        drawBars(data, [
          ["Receitas", s.income, data.theme.success],
          ["Despesas", s.expenses, data.theme.danger],
          ["Saldo", Math.max(s.balance, 0), data.theme.primary]
        ]);
      }

      function drawPerformanceChart() {
        const data = prepCanvas("performanceChart");
        if (!data) return;
        const values = state.performance
          .slice()
          .sort((a, b) => b.average - a.average)
          .slice(0, 6)
          .map(item => [employeeName(item.employeeId), Number(item.average || 0), data.theme.accent]);
        drawBars(data, values.length ? values : [["Sem dados", 0, data.theme.primary]], 100);
      }

      function drawKanbanChart() {
        const data = prepCanvas("kanbanChart");
        if (!data) return;
        const counts = ["todo", "doing", "done"].map(column => state.kanban.filter(item => item.column === column).length);
        drawDonut(data, [
          ["A Fazer", counts[0], data.theme.warning],
          ["Em Andamento", counts[1], data.theme.primary],
          ["Concluído", counts[2], data.theme.success]
        ]);
      }

      function drawBars({ ctx, w, h, theme }, rows, fixedMax) {
        const pad = 36;
        const max = fixedMax || Math.max(...rows.map(row => row[1]), 1);
        const barW = Math.max(28, (w - pad * 2) / rows.length - 18);
        ctx.strokeStyle = theme.line;
        ctx.fillStyle = theme.muted;
        ctx.font = "12px system-ui";
        for (let i = 0; i < 4; i++) {
          const y = pad + i * ((h - pad * 2) / 3);
          ctx.beginPath();
          ctx.moveTo(pad, y);
          ctx.lineTo(w - pad, y);
          ctx.stroke();
        }
        rows.forEach((row, index) => {
          const [label, value, color] = row;
          const x = pad + index * ((w - pad * 2) / rows.length) + 8;
          const barH = (Number(value || 0) / max) * (h - pad * 2);
          const y = h - pad - barH;
          ctx.fillStyle = color;
          roundRect(ctx, x, y, barW, barH || 2, 7);
          ctx.fill();
          ctx.fillStyle = theme.text;
          ctx.font = "700 12px system-ui";
          ctx.fillText(String(Math.round(value)), x, Math.max(18, y - 8));
          ctx.fillStyle = theme.muted;
          ctx.font = "12px system-ui";
          ctx.fillText(label.slice(0, 16), x, h - 12);
        });
      }

      function drawDonut({ ctx, w, h, theme }, rows) {
        const total = rows.reduce((sum, row) => sum + row[1], 0) || 1;
        const cx = w * .38;
        const cy = h * .5;
        const radius = Math.min(w, h) * .28;
        let start = -Math.PI / 2;
        rows.forEach(([label, value, color], index) => {
          const angle = (value / total) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, radius, start, start + angle);
          ctx.closePath();
          ctx.fillStyle = value ? color : theme.line;
          ctx.fill();
          start += angle;
          ctx.fillStyle = color;
          ctx.fillRect(w * .68, 58 + index * 34, 14, 14);
          ctx.fillStyle = theme.text;
          ctx.font = "700 13px system-ui";
          ctx.fillText(`${label}: ${value}`, w * .68 + 22, 70 + index * 34);
        });
        ctx.beginPath();
        ctx.arc(cx, cy, radius * .58, 0, Math.PI * 2);
        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue("--surface").trim();
        ctx.fill();
        ctx.fillStyle = theme.text;
        ctx.font = "800 22px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(String(total === 1 && rows.every(row => row[1] === 0) ? 0 : total), cx, cy + 8);
        ctx.textAlign = "left";
      }

      function roundRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, Math.abs(height) / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function renderEmployees() {
        $("#employees").innerHTML = crudShell({
          title: "Gestão de Colaboradores",
          action: "Novo colaborador",
          buttonId: "employeeAdd",
          filters: `
            <input id="employeeSearch" placeholder="Pesquisar por nome, cargo ou competência">
            <select id="employeeSector"><option value="">Todos os setores</option>${uniqueOptions(state.employees, "sector")}</select>
          `,
          table: employeeTable()
        });
        $("#employeeAdd").addEventListener("click", () => employeeForm());
        $("#employeeSearch").addEventListener("input", renderEmployees);
        $("#employeeSector").addEventListener("change", renderEmployees);
        bindEmployeeActions();
      }

      function crudShell({ title, action, buttonId, filters, table }) {
        return `
          <div class="toolbar">
            <h3 class="panel-title">${title}</h3>
            <button class="btn primary" id="${buttonId}" type="button">${action}</button>
          </div>
          <div class="filters">${filters}</div>
          <div class="card" style="margin-top:14px;"><div class="table-wrap">${table}</div></div>
        `;
      }

      function uniqueOptions(list, key) {
        return [...new Set(list.map(item => item[key]).filter(Boolean))]
          .map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
      }

      function employeeTable() {
        const search = ($("#employeeSearch")?.value || "").toLowerCase();
        const sector = $("#employeeSector")?.value || "";
        const rows = state.employees.filter(item => {
          const hay = `${item.name} ${item.role} ${item.sector} ${item.skills}`.toLowerCase();
          return hay.includes(search) && (!sector || item.sector === sector);
        });
        if (!rows.length) return `<div class="empty">Nenhum colaborador encontrado.</div>`;
        return `
          <table>
            <thead><tr><th>Nome</th><th>Cargo</th><th>Setor</th><th>Salário</th><th>Admissão</th><th>Competências</th><th>Ações</th></tr></thead>
            <tbody>${rows.map(item => `
              <tr>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td>${escapeHtml(item.role)}</td>
                <td><span class="tag">${escapeHtml(item.sector)}</span></td>
                <td>${money(item.salary)}</td>
                <td>${escapeHtml(item.admission)}</td>
                <td>${escapeHtml(item.skills)}</td>
                <td><div class="row-actions">
                  <button class="btn" data-edit-employee="${item.id}" type="button">Editar</button>
                  <button class="btn danger" data-delete-employee="${item.id}" type="button">Excluir</button>
                </div></td>
              </tr>`).join("")}</tbody>
          </table>
        `;
      }

      function employeeForm(id) {
        const item = state.employees.find(emp => emp.id === id) || {};
        modal({
          title: id ? "Editar colaborador" : "Novo colaborador",
          subtitle: "Cadastre dados usados nos demais módulos.",
          body: `
            <form id="employeeForm" class="form-grid">
              ${input("name", "Nome", item.name, true)}
              ${input("role", "Cargo", item.role, true)}
              ${input("sector", "Setor", item.sector, true)}
              ${input("salary", "Salário", item.salary, true, "number")}
              ${input("admission", "Data de admissão", item.admission, true, "date")}
              ${input("skills", "Competências", item.skills, true, "text", "full")}
            </form>
          `,
          actions: [
            { label: "Cancelar", onClick: closeModal },
            { label: "Salvar", variant: "primary", onClick: () => saveEmployee(id) }
          ]
        });
      }

      function input(name, label, value = "", required = false, type = "text", cls = "") {
        return `<label class="${cls}">${label}<input name="${name}" type="${type}" value="${escapeHtml(value)}" ${required ? "required" : ""}></label>`;
      }

      function saveEmployee(id) {
        const data = formData("#employeeForm");
        if (!data.name.trim()) return toast("Validação", "Informe o nome do colaborador.", "error");
        const duplicate = state.employees.some(item => item.name.toLowerCase() === data.name.toLowerCase() && item.id !== id);
        if (duplicate) return toast("Duplicidade", "Já existe um colaborador com esse nome.", "warning");
        const payload = { id: id || cryptoId(), ...data, salary: Number(data.salary || 0) };
        if (id) state.employees = state.employees.map(item => item.id === id ? payload : item);
        else state.employees.push(payload);
        closeModal();
        renderEmployees();
        toast("Colaborador salvo", "Cadastro atualizado com sucesso.");
      }

      function bindEmployeeActions() {
        $$("[data-edit-employee]").forEach(btn => btn.addEventListener("click", () => employeeForm(btn.dataset.editEmployee)));
        $$("[data-delete-employee]").forEach(btn => btn.addEventListener("click", () => confirmAction("Excluir colaborador?", "Avaliações vinculadas também serão removidas.", () => {
          const id = btn.dataset.deleteEmployee;
          state.employees = state.employees.filter(item => item.id !== id);
          state.performance = state.performance.filter(item => item.employeeId !== id);
          renderEmployees();
          toast("Colaborador excluído", "Registro removido com segurança.", "warning");
        })));
      }

      function formData(selector) {
        return Object.fromEntries(new FormData($(selector)).entries());
      }

      function renderPerformance() {
        $("#performance").innerHTML = `
          <div class="grid two-col">
            <article class="card pad">
              <div class="toolbar"><h3 class="panel-title">Avaliação de Desempenho</h3><button class="btn primary" id="perfAdd" type="button">Nova avaliação</button></div>
              <div class="table-wrap">${performanceTable()}</div>
            </article>
            <article class="card">
              <div class="card-head"><div><h3>Ranking</h3><p>Ordenado pela média automática</p></div></div>
              <div class="rank">${ranking()}</div>
            </article>
          </div>
        `;
        $("#perfAdd").addEventListener("click", () => performanceForm());
        $$("[data-edit-perf]").forEach(btn => btn.addEventListener("click", () => performanceForm(btn.dataset.editPerf)));
        $$("[data-delete-perf]").forEach(btn => btn.addEventListener("click", () => confirmAction("Excluir avaliação?", "O ranking será atualizado automaticamente.", () => {
          state.performance = state.performance.filter(item => item.id !== btn.dataset.deletePerf);
          renderPerformance();
          toast("Avaliação excluída", "Registro removido.", "warning");
        })));
      }

      function performanceTable() {
        if (!state.performance.length) return `<div class="empty">Cadastre avaliações para montar o ranking.</div>`;
        return `
          <table>
            <thead><tr><th>Colaborador</th><th>Técnica</th><th>Comportamental</th><th>Média</th><th>Feedback</th><th>Ações</th></tr></thead>
            <tbody>${state.performance.map(item => `
              <tr>
                <td>${employeeName(item.employeeId)}</td>
                <td>${item.technical}</td>
                <td>${item.behavioral}</td>
                <td><span class="tag ${scoreColor(item.average)}">${pct(item.average)}</span></td>
                <td>${feedback(item.average)}</td>
                <td><div class="row-actions"><button class="btn" data-edit-perf="${item.id}" type="button">Editar</button><button class="btn danger" data-delete-perf="${item.id}" type="button">Excluir</button></div></td>
              </tr>`).join("")}</tbody>
          </table>
        `;
      }

      function performanceForm(id) {
        if (!state.employees.length) return toast("Sem colaboradores", "Cadastre colaboradores antes de avaliar.", "warning");
        const item = state.performance.find(row => row.id === id) || {};
        modal({
          title: id ? "Editar avaliação" : "Nova avaliação",
          body: `
            <form id="performanceForm" class="form-grid">
              <label class="full">Colaborador<select name="employeeId" required>${state.employees.map(emp => `<option value="${emp.id}" ${emp.id === item.employeeId ? "selected" : ""}>${escapeHtml(emp.name)}</option>`).join("")}</select></label>
              ${input("technical", "Avaliação Técnica (0-100)", item.technical ?? 80, true, "number")}
              ${input("behavioral", "Avaliação Comportamental (0-100)", item.behavioral ?? 80, true, "number")}
            </form>
          `,
          actions: [
            { label: "Cancelar", onClick: closeModal },
            { label: "Salvar", variant: "primary", onClick: () => savePerformance(id) }
          ]
        });
      }

      function savePerformance(id) {
        const data = formData("#performanceForm");
        const technical = clamp(data.technical);
        const behavioral = clamp(data.behavioral);
        const payload = { id: id || cryptoId(), employeeId: data.employeeId, technical, behavioral, average: (technical + behavioral) / 2 };
        if (id) state.performance = state.performance.map(item => item.id === id ? payload : item);
        else state.performance.push(payload);
        closeModal();
        renderPerformance();
        toast("Avaliação salva", feedback(payload.average));
      }

      function clamp(value) {
        return Math.max(0, Math.min(100, Number(value || 0)));
      }

      function employeeName(id) {
        return state.employees.find(item => item.id === id)?.name || "Não encontrado";
      }

      function feedback(score) {
        if (score >= 90) return "Excelente desempenho. Indicado para liderança e mentoria.";
        if (score >= 75) return "Bom desempenho. Manter evolução com desafios práticos.";
        if (score >= 60) return "Desempenho regular. Recomenda-se plano de capacitação.";
        return "Atenção prioritária. Criar acompanhamento e treinamento imediato.";

      function genericManager({ title, addId, empty, rows, card, prefix }) {
        return `
          <div class="toolbar"><h3 class="panel-title">${title}</h3><button class="btn primary" id="${addId}" type="button">Adicionar</button></div>
          <div class="grid three-col">${rows.length ? rows.map(item => `<article class="item">${card(item)}<div class="row-actions" style="margin-top:12px;"><button class="btn" data-edit-${prefix}="${item.id}" type="button">Editar</button><button class="btn danger" data-delete-${prefix}="${item.id}" type="button">Excluir</button></div></article>`).join("") : `<div class="empty">${empty}</div>`}</div>
        `;
      }

      function bindGeneric(prefix, rows, formFn, renderFn) {
        $$(`[data-edit-${prefix}]`).forEach(btn => btn.addEventListener("click", () => formFn(btn.getAttribute(`data-edit-${prefix}`))));
        $$(`[data-delete-${prefix}]`).forEach(btn => btn.addEventListener("click", () => confirmAction("Excluir registro?", "A remoção será permanente neste navegador.", () => {
          const id = btn.getAttribute(`data-delete-${prefix}`);
          const index = rows.findIndex(item => item.id === id);
          if (index >= 0) rows.splice(index, 1);
          renderFn();
          toast("Registro excluído", "Item removido com sucesso.", "warning");
        })));
      }

      function saveGeneric(formId, rows, id, renderFn, message) {
        const data = formData(`#${formId}`);
        const first = Object.values(data)[0];
        if (!String(first || "").trim()) return toast("Validação", "Preencha os campos obrigatórios.", "error");
        const payload = { id: id || cryptoId(), ...data };
        const index = rows.findIndex(item => item.id === id);
        if (index >= 0) rows[index] = payload;
        else rows.push(payload);
        closeModal();
        renderFn();
        toast(message, "Dados atualizados.");
      }

        const duplicate = state.stock.some(item => item.product.toLowerCase() === data.product.toLowerCase() && item.id !== id);
        if (duplicate) return toast("Duplicidade", "Produto já cadastrado.", "warning");
        const payload = { id: id || cryptoId(), ...data, qty: Number(data.qty || 0), price: Number(data.price || 0) };
        if (id) state.stock = state.stock.map(item => item.id === id ? payload : item);
        else state.stock.push(payload);

        renderStock();

          title: kind === "in" ? "Entrada de estoque" : "Saída de estoque",

            const item = state.stock.find(row => row.id === id);
            if (!item || amount <= 0) return toast("Validação", "Informe uma quantidade válida.", "error");
            item.qty = kind === "in" ? Number(item.qty) + amount : Math.max(0, Number(item.qty) - amount);

            renderStock();
            toast("Movimento aplicado", "Quantidade atualizada.");
          }}]
        });

      function bindKanban() {
        $$(".task-card").forEach(card => {
          card.addEventListener("dragstart", () => { dragId = card.dataset.card; card.classList.add("dragging"); });
          card.addEventListener("dragend", () => { dragId = null; card.classList.remove("dragging"); });
        });
        $$(".kanban-col").forEach(col => {
          col.addEventListener("dragover", event => { event.preventDefault(); col.classList.add("drop-over"); });
          col.addEventListener("dragleave", () => col.classList.remove("drop-over"));
          col.addEventListener("drop", event => {
            event.preventDefault();
            col.classList.remove("drop-over");
            const item = state.kanban.find(card => card.id === dragId);
            if (item) item.column = col.dataset.column;
            renderKanban();
            toast("Kanban atualizado", "Card movido com sucesso.");

      function smallCard(title, text, prefix) {
        return `<article class="item"><h4>${escapeHtml(title)}</h4><p>${escapeHtml(text)}</p><div class="row-actions" style="margin-top:12px;"><button class="btn" data-edit-${prefix}="${escapeHtml(title)}" type="button">Editar</button><button class="btn danger" data-delete-${prefix}="${escapeHtml(title)}" type="button">Excluir</button></div></article>`;
      }

      function marketingForm(type, key) {
        const map = {
          client: [state.clients, item => item.name === key, "Cliente", `
            ${input("name", "Nome", "", true)}${input("company", "Empresa", "", true)}${input("contact", "Contato", "", true, "text", "full")}`],
          campaign: [state.campaigns, item => item.name === key, "Campanha", `
            ${input("name", "Nome", "", true)}${input("objective", "Objetivo", "", true)}<label class="full">Status<select name="status"><option>Planejada</option><option>Ativa</option><option>Concluída</option></select></label>`],
          plan: [state.plans, item => item.what === key, "Plano 5W2H", `
            ${["what","why","where","when","who","how"].map(field => input(field, fieldLabel(field), "", true)).join("")}${input("howMuch", "How Much", 0, true, "number", "full")}`]
        };
        const [rows, finder, title, fields] = map[type];
        const item = rows.find(finder) || {};
        modal({
          title: `${key ? "Editar" : "Novo"} ${title}`,
          body: `<form id="marketingForm" class="form-grid">${fillFields(fields, item)}</form>`,
          actions: [{ label: "Cancelar", onClick: closeModal }, { label: "Salvar", variant: "primary", onClick: () => {
            const data = formData("#marketingForm");
            const first = type === "plan" ? data.what : data.name;
            if (!String(first || "").trim()) return toast("Validação", "Preencha o campo principal.", "error");
            const duplicate = rows.some(row => (type === "plan" ? row.what : row.name).toLowerCase() === first.toLowerCase() && !finder(row));
            if (duplicate) return toast("Duplicidade", "Já existe um registro com esse nome.", "warning");
            const payload = { ...data, id: item.id || cryptoId() };
            const index = rows.findIndex(finder);
            if (index >= 0) rows[index] = payload;
            else rows.push(payload);
            closeModal();
            renderMarketing();
            toast("Marketing atualizado", "Registro salvo com sucesso.");
          }}]
        });
      }

      function fillFields(template, item) {
        let html = template;
        Object.keys(item).forEach(key => {
          html = html.replace(`name="${key}" type="text" value=""`, `name="${key}" type="text" value="${escapeHtml(item[key])}"`);
          html = html.replace(`name="${key}" type="number" value="0"`, `name="${key}" type="number" value="${escapeHtml(item[key])}"`);
          html = html.replace(`<option>${escapeHtml(item[key])}</option>`, `<option selected>${escapeHtml(item[key])}</option>`);
        });
        return html;
      }

      function fieldLabel(field) {
        return ({ what: "What", why: "Why", where: "Where", when: "When", who: "Who", how: "How" })[field] || field;
      }

      function bindMarketingActions() {
        ["client", "campaign", "plan"].forEach(type => {
          $$(`[data-edit-${type}]`).forEach(btn => btn.addEventListener("click", () => marketingForm(type, btn.getAttribute(`data-edit-${type}`))));
          $$(`[data-delete-${type}]`).forEach(btn => btn.addEventListener("click", () => confirmAction("Excluir registro?", "O item será removido deste módulo.", () => {
            const key = btn.getAttribute(`data-delete-${type}`);
            const rows = type === "client" ? state.clients : type === "campaign" ? state.campaigns : state.plans;
            const index = rows.findIndex(item => (type === "plan" ? item.what : item.name) === key);
            if (index >= 0) rows.splice(index, 1);
            renderMarketing();
            toast("Registro excluído", "Marketing atualizado.", "warning");
          })));
        });
      }

      function matrixCells() {
        const groups = [
          ["Alto impacto / Baixo esforço", idea => idea.impacto >= 4 && idea.esforco <= 2, "green"],
          ["Alto impacto / Alto esforço", idea => idea.impacto >= 4 && idea.esforco > 2, "yellow"],
          ["Baixo impacto / Baixo esforço", idea => idea.impacto < 4 && idea.esforco <= 2, "purple"],
          ["Baixo impacto / Alto esforço", idea => idea.impacto < 4 && idea.esforco > 2, "red"]
        ];
        return groups.map(([title, filter, color]) => `<div class="matrix-cell"><h4>${title}</h4>${state.ideas.filter(filter).map(idea => `<span class="tag ${color}" style="margin:3px;">${escapeHtml(idea.title)}</span>`).join("") || `<p style="color:var(--muted);margin:0;">Sem itens</p>`}</div>`).join("");
      }

      function ideaForm(id) {
        const item = state.ideas.find(row => row.id === id) || {};
        modal({
          title: id ? "Editar ideia" : "Nova ideia",
          body: `
            <form id="ideaForm" class="form-grid">
              ${input("title", "Título", item.title, true)}
              <label>Prioridade<select name="priority"><option ${item.priority === "Baixa" ? "selected" : ""}>Baixa</option><option ${item.priority === "Média" ? "selected" : ""}>Média</option><option ${item.priority === "Alta" ? "selected" : ""}>Alta</option></select></label>
              ${input("impacto", "Impacto (1-5)", item.impacto ?? 4, true, "number")}
              ${input("esforco", "Esforço (1-5)", item.esforco ?? 2, true, "number")}
              <label>Método<select name="method"><option ${item.method === "Matriz Impacto x Esforço" ? "selected" : ""}>Matriz Impacto x Esforço</option><option ${item.method === "Design Thinking" ? "selected" : ""}>Design Thinking</option></select></label>
              <label class="full">Descrição<textarea name="description" required>${escapeHtml(item.description || "")}</textarea></label>
            </form>
          `,
          actions: [{ label: "Cancelar", onClick: closeModal }, { label: "Salvar", variant: "primary", onClick: () => {
            const data = formData("#ideaForm");
            if (!data.title.trim()) return toast("Validação", "Informe o título.", "error");
            const payload = { id: id || cryptoId(), ...data, impacto: clamp5(data.impacto), esforco: clamp5(data.esforco) };
            if (id) state.ideas = state.ideas.map(item => item.id === id ? payload : item);
            else state.ideas.push(payload);
            closeModal();
            renderIdeas();
            toast("Ideia salva", "Matriz atualizada.");
          }}]
        });
      }

      function clamp5(value) {
        return Math.max(1, Math.min(5, Number(value || 1)));
      }

      function renderAssistant() {
        $("#assistant").innerHTML = `
          <div class="ai-shell">
            <article class="card pad">
              <h3 class="panel-title">Assistente Inteligente</h3>
              <p style="color:var(--muted);line-height:1.5;">Painel de IA simulada com regras em JavaScript para apoiar decisões administrativas.</p>
              <div class="ai-options">
                <button class="btn primary" data-ai="feedback" type="button">Gerar feedback</button>
                <button class="btn" data-ai="training" type="button">Sugerir treinamentos</button>
                <button class="btn" data-ai="swot" type="button">Criar análise SWOT</button>
                <button class="btn" data-ai="5w2h" type="button">Criar plano 5W2H</button>
                <button class="btn" data-ai="report" type="button">Relatório gerencial</button>
              </div>
            </article>
            <article class="card pad">
              <h3 class="panel-title">Resultado</h3>
              <div class="ai-output" id="aiOutput">Selecione uma ação para gerar uma análise administrativa simulada.</div>
            </article>
          </div>
        `;
        $$("[data-ai]").forEach(btn => btn.addEventListener("click", () => generateAI(btn.dataset.ai)));
      }

      function generateAI(type) {
        const s = stats();
        const weak = state.performance.filter(item => item.average < 70).map(item => employeeName(item.employeeId));
        const best = state.performance.slice().sort((a, b) => b.average - a.average)[0];
        const output = {
          feedback: `Feedback de desempenho\n\nMelhor destaque: ${best ? employeeName(best.employeeId) + " com " + pct(best.average) : "sem avaliações suficientes"}.\nColaboradores que precisam de apoio: ${weak.length ? weak.join(", ") : "nenhum caso crítico"}.\nAção recomendada: combinar metas semanais, mentoria interna e revisão de competências por setor.`,
          training: `Sugestões de treinamentos\n\n1. Excel e indicadores para equipes administrativas.\n2. Atendimento ao cliente para marketing e vendas.\n3. Finanças básicas para gestores de projeto.\n4. Liderança situacional para colaboradores acima de 85% de média.\n\nPrioridade: ${s.trainingNeeds > 0 ? "alta, existem necessidades abertas." : "preventiva, cenário estável."}`,
          swot: `Análise SWOT\n\nForças: equipe cadastrada, controle de estoque e visão financeira integrada.\nFraquezas: ${s.balance < 0 ? "saldo negativo e pressão de despesas." : "dependência de dados manuais."}\nOportunidades: ampliar campanhas, registrar clientes e transformar ideias em projetos.\nAmeaças: ruptura de estoque, baixa capacitação e queda de desempenho se os indicadores não forem acompanhados.`,
          "5w2h": `Plano 5W2H\n\nWhat: melhorar a gestão operacional da empresa simulada.\nWhy: aumentar previsibilidade financeira e desempenho.\nWhere: módulos de colaboradores, caixa, estoque e kanban.\nWhen: próximos 30 dias.\nWho: estudantes responsáveis por cada área.\nHow: reuniões semanais, atualização de dados e análise do dashboard.\nHow Much: ${money(Math.max(1500, s.payroll * .05))}.`,
          report: `Relatório gerencial AdminTech Hub\n\nColaboradores: ${state.employees.length}\nDesempenho médio: ${pct(s.perfAvg)}\nNecessidades de treinamento: ${s.trainingNeeds}\nSaldo atual: ${money(s.balance)}\nEstoque: ${money(s.stockValue)}\nVendas do mês: ${money(s.sales)}\nProjetos ativos: ${s.projects}\n\nParecer: ${s.balance >= 0 ? "a operação apresenta equilíbrio financeiro." : "a operação exige redução de despesas ou aumento de receitas."} ${s.perfAvg >= 75 ? "O desempenho humano é satisfatório." : "O desenvolvimento da equipe deve ser priorizado."}`
        }[type];
        $("#aiOutput").textContent = output;
        toast("Assistente gerou análise", "Resultado atualizado no painel.");
      }

      window.addEventListener("resize", () => {
        if (currentModule === "dashboard") drawAllCharts();
      });

      initShell();
      render();
    })();
  </script>
